<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-md-3 bg-dark text-white vh-100 p-3">
        <h4>Dashboard</h4>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link text-white" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Students</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Courses</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Exams</a></li>
        </ul>
    </div>

    <div class="col-md-9 p-4">
        <h2>Admin Dashboard</h2>

        <div class="row mt-4">

            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5>Total Students</h5>
                        <p>1200</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5>Total Courses</h5>
                        <p>45</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5>Exams</h5>
                        <p>30</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        <h5>Pending Tasks</h5>
                        <p>8</p>
                    </div>
                </div>
            </div>

        </div>

    </div>

  </div>
</div>

</body>
</html>
