<!DOCTYPE html>
<html>
<head>
    <title>My Mobile Website</title>

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>

    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<!-- HOME PAGE -->
<div data-role="page" id="home">

    <div data-role="header">
        <h1>My Mobile Site</h1>
    </div>

    <div data-role="content">
        <p>Welcome to Home Page</p>

        <!-- Buttons -->
        <a href="#about" class="ui-btn ui-btn-b ui-corner-all">Go to About</a>
        <a href="#contact" class="ui-btn ui-btn-b ui-corner-all">Go to Contact</a>

        <!-- LIST VIEW (IMPORTANT) -->
        <ul data-role="listview" data-inset="true">
            <li><a href="#">Student 1</a></li>
            <li><a href="#">Student 2</a></li>
            <li><a href="#">Student 3</a></li>
        </ul>
    </div>

    <div data-role="footer">
        <h4>Footer</h4>
    </div>

</div>

<!-- ABOUT PAGE -->
<div data-role="page" id="about">

    <div data-role="header">
        <h1>About</h1>
    </div>

    <div data-role="content">
        <p>This is About Page</p>

        <!-- FIXED BUTTON -->
        <a href="#home" class="ui-btn ui-btn-a ui-corner-all">Go to Home</a>
    </div>

    <div data-role="footer">
        <h4>Footer</h4>
    </div>

</div>

<!-- CONTACT PAGE -->
<div data-role="page" id="contact">

    <div data-role="header">
        <h1>Contact</h1>
    </div>

    <div data-role="content">
        <p>Email: example@gmail.com</p>

        <a href="#home" class="ui-btn ui-btn-a ui-corner-all">Go to Home</a>
    </div>

    <div data-role="footer">
        <h4>Footer</h4>
    </div>

</div>

</body>
</html>
